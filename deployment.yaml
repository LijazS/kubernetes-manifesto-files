apiVersion: apps/v1
kind: Deployment
metadata: 
  name: ey-cart-deployment
  namespace: lijaz-namespace
  labels:
    app: cart
spec: # it defines the behaviour of the ReplicaSet
  replicas: 3
  selector: # it defines how replica set finds the pods to manage
    matchLabels:
      app: ey
  template: # Contains pod definitions
    metadata:
      labels: 
        app: ey
    spec: # Contains container defenitions
      containers:
        - name: ey-container
          image: muralisocial123/ey-cart:v1.1.0

          ports:
           - containerPort: 3000
  
